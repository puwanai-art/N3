<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกซื้อหวย</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <header class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">บันทึกซื้อหวย</h1>
        </header>

        <div class="p-6">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-gray-600 uppercase text-xs border-b">
                        <th class="py-3">เดือน</th>
                        <th class="py-3">งวด</th>
                        <th class="py-3">ซื้อ</th>
                        <th class="py-3">ถูก</th>
                    </tr>
                </thead>
                <tbody id="lotteryTableBody">
                    <tr><td colspan="4" class="text-center py-4">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="p-6 bg-gray-50 border-t">
            <h2 class="font-bold mb-4">เพิ่มรายการใหม่</h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-2">
                <input type="text" id="monthInput" placeholder="เดือน" class="p-2 border rounded">
                <input type="text" id="periodInput" placeholder="งวด" class="p-2 border rounded">
                <input type="number" id="buyInput" placeholder="ยอดซื้อ" class="p-2 border rounded">
                <input type="number" id="winInput" placeholder="ยอดถูก" class="p-2 border rounded">
                <button onclick="addEntry()" class="bg-indigo-600 text-white p-2 rounded hover:bg-indigo-700">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        // *** ใส่ Web App URL ของคุณที่นี่ ***
        const SCRIPT_URL = 'ใส่_Web_App_URL_ของคุณ_ที่นี่';

        function addEntry() {
            const data = {
                month: document.getElementById('monthInput').value,
                period: document.getElementById('periodInput').value,
                buy: document.getElementById('buyInput').value,
                win: document.getElementById('winInput').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                alert("บันทึกสำเร็จ!");
                location.reload(); // รีเฟรชหน้าเว็บเพื่อดึงข้อมูลใหม่
            });
        }
    </script>
</body>
</html>
