<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกซื้อหวย</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <header class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">บันทึกซื้อหวย</h1>
        </header>

        <div class="p-6">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-2">
                <input type="text" id="monthInput" placeholder="เดือน" class="p-2 border rounded">
                <input type="text" id="periodInput" placeholder="งวด" class="p-2 border rounded">
                <input type="number" id="buyInput" placeholder="ยอดซื้อ" class="p-2 border rounded">
                <input type="number" id="winInput" placeholder="ยอดถูก" class="p-2 border rounded">
                <button onclick="saveToSheets()" class="bg-indigo-600 text-white p-2 rounded hover:bg-indigo-700">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        // URL ของคุณ
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzgzyoiM_bKZrdAK_mEGvUAvWQbXexcys3ZuL0kg8QwmFpG6vAYGkr0US3h1UDWLUx4/exec';

        function saveToSheets() {
            const data = {
                month: document.getElementById('monthInput').value,
                period: document.getElementById('periodInput').value,
                buy: document.getElementById('buyInput').value,
                win: document.getElementById('winInput').value
            };

            if(!data.month || !data.period) {
                alert("กรุณากรอกเดือนและงวด");
                return;
            }

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                alert("บันทึกสำเร็จ!");
                location.reload();
            }).catch(err => alert("เกิดข้อผิดพลาด: " + err));
        }
    </script>
</body>
</html>
