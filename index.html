<!DOCTYPE html>
<html>
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="p-4 bg-gray-100">
  <input type="text" id="m" placeholder="เดือน">
  <input type="text" id="p" placeholder="งวด">
  <input type="number" id="b" placeholder="ซื้อ">
  <input type="number" id="w" placeholder="ถูก">
  <button onclick="save()">บันทึก</button>
  <table id="t" class="w-full"></table>

  <script>
    function save() {
      const data = { month: document.getElementById('m').value, period: document.getElementById('p').value, b: document.getElementById('b').value, w: document.getElementById('w').value };
      google.script.run.withSuccessHandler(load).addEntry(data);
    }
    function load() {
      google.script.run.withSuccessHandler(res => {
        document.getElementById('t').innerHTML = res.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('');
      }).getData();
    }
    load();
  </script>
</body>
</html>
