<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>บันทึกซื้อหวย</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4">บันทึกซื้อหวย</h1>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-2">
            <input type="text" id="monthInput" placeholder="เดือน" class="border p-2 rounded">
            <input type="text" id="periodInput" placeholder="งวด" class="border p-2 rounded">
            <input type="number" id="buyInput" placeholder="ยอดซื้อ" class="border p-2 rounded">
            <input type="number" id="winInput" placeholder="ยอดถูก" class="border p-2 rounded">
            <button onclick="saveData()" class="bg-indigo-600 text-white p-2 rounded">บันทึก</button>
        </div>
    </div>

    <script>
        // *** ใส่ URL Web App ของคุณตรงนี้ (ที่ลงท้ายด้วย /exec) ***
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxC8FWS5vAYRJXowxrFuR_Epqfi0PmLV1eQSGtgaFqKkVedJYUaaE5i4MO6sOlXJiXnvg/exec';

        function saveData() {
            const data = {
                month: document.getElementById('monthInput').value,
                period: document.getElementById('periodInput').value,
                buy: document.getElementById('buyInput').value,
                win: document.getElementById('winInput').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                alert("บันทึกข้อมูลเรียบร้อยแล้ว!");
                document.querySelectorAll('input').forEach(i => i.value = '');
            }).catch(e => alert("เกิดข้อผิดพลาด: " + e));
        }
    </script>
</body>
</html>
